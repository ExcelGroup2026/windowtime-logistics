<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Queue Input - Google Sheets Integration</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      background: #f5f5f5;
      padding: 20px;
    }
    .container {
      max-width: 900px;
      margin: 0 auto;
      background: white;
      padding: 30px;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
    h1 {
      color: #333;
      margin-bottom: 30px;
      text-align: center;
    }
    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      margin-bottom: 30px;
    }
    .form-grid.full {
      grid-template-columns: 1fr;
    }
    .form-group {
      display: flex;
      flex-direction: column;
    }
    label {
      font-weight: 600;
      margin-bottom: 8px;
      color: #333;
      font-size: 14px;
    }
    label .required {
      color: red;
    }
    input, select, textarea {
      padding: 10px;
      border: 1px solid #ddd;
      border-radius: 4px;
      font-size: 14px;
      font-family: inherit;
    }
    input:focus, select:focus, textarea:focus {
      outline: none;
      border-color: #2f7cf6;
      box-shadow: 0 0 0 3px rgba(47, 124, 246, 0.1);
    }
    textarea {
      resize: vertical;
      min-height: 80px;
    }
    .button-group {
      display: flex;
      gap: 10px;
      justify-content: center;
      margin-top: 30px;
    }
    button {
      padding: 12px 30px;
      font-size: 16px;
      font-weight: 600;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      transition: all 0.3s;
    }
    .btn-save {
      background: #2f7cf6;
      color: white;
    }
    .btn-save:hover {
      background: #1e5ace;
    }
    .btn-reset {
      background: #e0e0e0;
      color: #333;
    }
    .btn-reset:hover {
      background: #d0d0d0;
    }
    .status-message {
      margin-top: 20px;
      padding: 15px;
      border-radius: 4px;
      text-align: center;
      font-weight: 600;
      display: none;
    }
    .status-message.success {
      background: #d4edda;
      color: #155724;
      display: block;
    }
    .status-message.error {
      background: #f8d7da;
      color: #721c24;
      display: block;
    }
    .status-message.loading {
      background: #cce5ff;
      color: #004085;
      display: block;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>📝 บันทึก Queue Data to Google Sheets</h1>

    <form id="queueForm">
      <div class="form-grid">
        <div class="form-group">
          <label>Date <span class="required">*</span></label>
          <input type="date" id="date" required>
        </div>
        <div class="form-group">
          <label>Queue No. (Q) <span class="required">*</span></label>
          <input type="text" id="queueNo" placeholder="Q001" required>
        </div>
      </div>

      <div class="form-grid">
        <div class="form-group">
          <label>Customer PO No. <span class="required">*</span></label>
          <input type="text" id="poNo" placeholder="PO-2026-001" required>
        </div>
        <div class="form-group">
          <label>Ship To Name / Destination <span class="required">*</span></label>
          <input type="text" id="destination" placeholder="Name or Location" required>
        </div>
      </div>

      <div class="form-grid full">
        <div class="form-group">
          <label>Description <span class="required">*</span></label>
          <textarea id="description" placeholder="Describe the delivery" required></textarea>
        </div>
      </div>

      <div class="form-grid">
        <div class="form-group">
          <label>Qty <span class="required">*</span></label>
          <input type="number" id="qty" placeholder="0" min="0" required>
        </div>
        <div class="form-group">
          <label>Fleet Type <span class="required">*</span></label>
          <select id="fleetType" required>
            <option value="">-- Select --</option>
            <option value="Own Fleet">Own Fleet</option>
            <option value="Subcontractor">Subcontractor</option>
          </select>
        </div>
      </div>

      <div class="form-grid">
        <div class="form-group">
          <label>Subcontractor Company <span class="required">*</span></label>
          <input type="text" id="subcompany" placeholder="Company Name" required>
        </div>
        <div class="form-group">
          <label>Truck Plate No. <span class="required">*</span></label>
          <input type="text" id="truckPlate" placeholder="ABC-1234" required>
        </div>
      </div>

      <div class="form-grid">
        <div class="form-group">
          <label>Driver Name <span class="required">*</span></label>
          <input type="text" id="driverName" placeholder="Driver Full Name" required>
        </div>
        <div class="form-group">
          <label>Truck Type <span class="required">*</span></label>
          <select id="truckType" required>
            <option value="">-- Select --</option>
            <option value="4W">4W (4 Wheels)</option>
            <option value="6W">6W (6 Wheels)</option>
            <option value="10W">10W (10 Wheels)</option>
          </select>
        </div>
      </div>

      <div class="form-grid">
        <div class="form-group">
          <label>Window Start <span class="required">*</span></label>
          <input type="time" id="windowStart" required>
        </div>
        <div class="form-group">
          <label>Window End <span class="required">*</span></label>
          <input type="time" id="windowEnd" required>
        </div>
      </div>

      <div class="form-grid">
        <div class="form-group">
          <label>Dock No. <span class="required">*</span></label>
          <input type="text" id="dockNo" placeholder="Dock-01" required>
        </div>
        <div class="form-group">
          <label>Status <span class="required">*</span></label>
          <select id="status" required>
            <option value="">-- Select --</option>
            <option value="Scheduled">Scheduled</option>
            <option value="In Progress">In Progress</option>
            <option value="Completed">Completed</option>
            <option value="Cancelled">Cancelled</option>
          </select>
        </div>
      </div>

      <div class="form-grid full">
        <div class="form-group">
          <label>Cancel Reason <span class="required">*</span></label>
          <textarea id="cancelReason" placeholder="Reason for cancellation (if applicable)"></textarea>
        </div>
      </div>

      <div class="button-group">
        <button type="submit" class="btn-save">💾 บันทึก (Save)</button>
        <button type="reset" class="btn-reset">🔄 Clear</button>
      </div>

      <div class="status-message" id="statusMessage"></div>
    </form>
  </div>

  <!-- Load sheet-api.js for Google Sheets integration -->
  <script src="sheet-api.js"></script>
  <script>
    // Set today's date as default
    document.getElementById('date').valueAsDate = new Date();

    // Handle form submission
    document.getElementById('queueForm').addEventListener('submit', async (e) => {
      e.preventDefault();

      const statusMsg = document.getElementById('statusMessage');
      statusMsg.className = 'status-message loading';
      statusMsg.textContent = '⏳ กำลังบันทึก...';

      try {
        // Collect form data
        const formData = {
          'Date': document.getElementById('date').value,
          'Queue No. (Q)': document.getElementById('queueNo').value,
          'Customer PO No.': document.getElementById('poNo').value,
          'Ship To Name / Destination': document.getElementById('destination').value,
          'Description': document.getElementById('description').value,
          'Qty': document.getElementById('qty').value,
          'Fleet Type (Own Fleet/Subcontractor)': document.getElementById('fleetType').value,
          'Subcontractor Company': document.getElementById('subcompany').value,
          'Truck Plate No.': document.getElementById('truckPlate').value,
          'Driver Name': document.getElementById('driverName').value,
          'Truck Type (4W/6W/10W)': document.getElementById('truckType').value,
          'Window Start': document.getElementById('windowStart').value,
          'Window End': document.getElementById('windowEnd').value,
          'Dock No.': document.getElementById('dockNo').value,
          'Status': document.getElementById('status').value,
          'Cancel Reason': document.getElementById('cancelReason').value
        };

        console.log('📤 Sending data to Google Sheets:', formData);

        // Send to Google Sheets via sheet-api.js
        if (window.sheetAPI) {
          const result = await window.sheetAPI.saveSheet('Queues', [formData]);
          console.log('✅ Data saved:', result);

          statusMsg.className = 'status-message success';
          statusMsg.textContent = '✅ บันทึกสำเร็จ! ตรวจสอบ Google Sheets Queues tab';

          // Reset form
          document.getElementById('queueForm').reset();
          document.getElementById('date').valueAsDate = new Date();

          // Clear message after 5 seconds
          setTimeout(() => {
            statusMsg.className = 'status-message';
          }, 5000);
        } else {
          throw new Error('sheetAPI not initialized');
        }
      } catch (error) {
        console.error('❌ Error:', error);
        statusMsg.className = 'status-message error';
        statusMsg.textContent = `❌ Error: ${error.message}`;
      }
    });
  </script>
</body>
</html>
